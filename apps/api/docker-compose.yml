services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twonick-api
    # Usa la red del host → localhost apunta a PG y Redis del VPS directamente
    network_mode: "host"
    env_file: .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
