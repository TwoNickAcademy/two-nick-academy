# ── Two-Nick Academy — Nginx Reverse Proxy ───────────────────────────
# Coloca este archivo en: /etc/nginx/sites-available/twonick
# Luego: sudo ln -s /etc/nginx/sites-available/twonick /etc/nginx/sites-enabled/
# Para SSL: sudo certbot --nginx -d api.twonick.academy

server {
    listen 80;
    server_name api.twonick.academy;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.twonick.academy;

    ssl_certificate     /etc/letsencrypt/live/api.twonick.academy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.twonick.academy/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Límite de tamaño para uploads (AI Mentor acepta imágenes)
    client_max_body_size 15M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Soporte WebSocket (Socket.io)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts extendidos para SSE (AI streaming) y WebSocket
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
